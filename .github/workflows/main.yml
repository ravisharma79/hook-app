name: CI Pipeline

# 1. When should this pipeline run?
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

# 2. What should it do?
jobs:
  build-and-test:
    # 3. What operating system should the GitHub robot use?
    runs-on: ubuntu-latest

    # 4. The step-by-step instructions
    steps:
      # Step A: Download your code from the repository onto the robot server
      - name: Checkout Code
        uses: actions/checkout@v3

      # Step B: Install Docker tools on the robot server
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # Step C: Attempt to build the Docker image (just like you did locally!)
      - name: Build Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: false # We are just testing the build for now, not saving it anywhere yet
          tags: devops-hook-app:latest
